<!DOCTYPE html>
<html>
<head>

<title>Products</title>

<style>

/* BODY */
body {
    margin: 0;
    overflow-x: hidden;
}

/* 🔥 TOP HEADER (ONLY FIX) */
.top-header {
    position: relative;
    text-align: center;
    background: #7A1E2C;
    color: white;
    padding: 15px;
}

/* BACK BUTTON */
.back-btn {
    position: absolute;
    left: 10px;
    top: 10px;
    border: none;
    background: white;
    color: #7A1E2C;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* EXISTING HEADER (UNCHANGED) */
.main-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #FFF8F6;
}

/* SIDEBAR */
.side-menu {
    position: fixed;
    top: 0;
    left: -260px;
    width: 250px;
    height: 100%;
    background: white;
    padding: 20px;
    transition: left 0.3s ease;
    overflow-y: auto;
    z-index: 1000;
}

.side-menu.active {
    left: 0;
}

.side-menu a {
    display: block;
    width: 100%;
    padding: 12px 5px;
    border-bottom: 1px solid #7A1E2C;
    text-decoration: none;
    color: black;
    font-size: 16px;
}

.side-menu a:hover {
    background: #f5f5f5;
    padding-left: 10px;
}

</style>

<link rel="stylesheet" href="style.css">

</head>

<body onload="loadCategory();updateCartCount();displayProducts();searchFromURL();">

<div class="container">

<div class="search-box">

</div>

</select>

<script>

/* BACK FUNCTION */
function goBack(){
    if(document.referrer !== ""){
        window.history.back();
    } else {
        window.location.href = "index.html";
    }
}

/* SIDEBAR */
function openMenu(){
    document.getElementById("sideMenu").classList.add("active");
}

function closeMenu(){
    document.getElementById("sideMenu").classList.remove("active");
}

</script>

<script src="script.js"></script>
